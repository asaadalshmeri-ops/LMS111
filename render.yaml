services:
  # 1. React Frontend SPA (Static Site - Free Plan)
  - type: web
    name: lms-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "frontend/dist"
    headers:
      - path: "/*"
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_SOCKET_URL
        value: https://lms111.onrender.com
    routes:
      # Rewrite API requests to the backend service
      - type: rewrite
        source: "/api/*"
        destination: "https://lms-backend.onrender.com/api/*"
      # Rewrite uploads to the backend service
      - type: rewrite
        source: "/uploads/*"
        destination: "https://lms-backend.onrender.com/uploads/*"
      # Redirect all paths to index.html for React Router to work
      - type: rewrite
        source: "/*"
        destination: "/index.html"

  # 2. Node.js WebSockets Bridge (Web Service - Node Runtime)
  - type: web
    name: lms-socket-bridge
    runtime: node
    buildCommand: "npm install"
    startCommand: "node socket-bridge.js"
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # 3. Laravel Backend REST API (Web Service - PHP Runtime)
  - type: web
    name: lms-backend
    runtime: php
    buildCommand: "cd laravel-backend && composer install --no-dev --optimize-autoloader"
    startCommand: "cd laravel-backend && touch database/database.sqlite && php artisan migrate --force --seed && php artisan serve --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://lms-backend.onrender.com
      - key: SOCKET_BRIDGE_URL
        value: https://lms111.onrender.com
